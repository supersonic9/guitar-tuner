<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tuna — Guitar Tuner</title>
  </head>
  <body>
    <div id="app">
      <div id="note-display">—</div>
      <div id="tuner-wrap">
        <div id="tuner-bar">
          <div id="center-mark"></div>
          <div id="bar-needle"></div>
        </div>
        <div id="bar-labels">
          <span>♭ flat</span>
          <span>in tune</span>
          <span>sharp ♯</span>
        </div>
      </div>
      <div id="cents-display">—</div>
      <button id="btn-toggle">START TUNING</button>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
